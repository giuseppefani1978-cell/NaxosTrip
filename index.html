<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Naxos — Carte interactive depuis Galini</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
html,body{margin:0;height:100%;font-family:Arial,Helvetica,sans-serif}
body{padding-bottom:env(safe-area-inset-bottom)}
#map{height:100vh;width:100vw}
.panel{position:absolute;z-index:1000;top:14px;left:14px;width:340px;max-width:calc(100vw - 28px);background:rgba(255,255,255,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:18px;box-shadow:0 8px 30px rgba(0,0,0,.20);padding:16px;font-size:14px;box-sizing:border-box}
.panel h1{margin:0 0 8px;font-size:18px}
label{display:block;margin-top:10px;font-weight:bold}
select,button{width:100%;padding:10px;margin-top:6px;border-radius:10px;border:1px solid #bbb;font-size:15px;box-sizing:border-box}
button{background:#1f6feb;color:white;border:none;font-weight:bold;cursor:pointer}
button:hover{background:#1557ba}
.info{margin-top:10px;padding:10px;background:#f3f6ff;border-radius:10px;line-height:1.35}
.tag{display:inline-block;padding:3px 7px;border-radius:999px;background:#eef2ff;margin:3px 3px 3px 0}
.spotIcon{font-size:26px;filter:drop-shadow(0 1px 3px #555)}
.vehicleIcon{font-size:30px;filter:drop-shadow(0 2px 4px #444);display:flex;align-items:center;gap:2px}
.vehicleIcon img{width:22px;height:22px;object-fit:contain}
.startCharacters{display:flex;gap:2px}
.startCharacters img{width:24px;height:24px;object-fit:contain;filter:drop-shadow(0 2px 3px #444)}
#welcome{position:absolute;z-index:2000;inset:0;background:linear-gradient(180deg,#eaf4ff,#ffffff);display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
.welcomeBox{background:white;border-radius:24px;padding:24px;max-width:360px;box-shadow:0 12px 40px rgba(0,0,0,.22)}
.welcomeChars{display:flex;justify-content:center;gap:24px;margin:16px 0}
.welcomeChars img{width:92px;height:92px;object-fit:contain}
.welcomeBox button{margin-top:14px}
.small{font-size:12px;color:#555}
.planning{margin-top:10px;padding:10px;background:#fff8e8;border-radius:10px;line-height:1.35}
@media (max-width:768px){
.panel{top:auto;bottom:calc(10px + env(safe-area-inset-bottom));left:10px;right:10px;width:auto;max-width:none;max-height:48vh;overflow-y:auto;-webkit-overflow-scrolling:touch;border-radius:22px;padding:16px;font-size:14px}
.panel h1{font-size:17px}
select,button{min-height:46px;font-size:16px}
.welcomeChars img{width:74px;height:74px}
}
</style>
</head>
<body>

<div id="map"></div>

<div id="welcome">
  <div class="welcomeBox">
    <h1>🏝️ Naxos Adventure</h1>
    <p>Choisis ton personnage et prépare ton parcours depuis Galini.</p>
    <div class="welcomeChars">
      <div><img src="assets/pte-gauloise.jpg"><br><b>P’te Gauloise</b></div>
      <div><img src="assets/pt-rital.jpg"><br><b>P’t Rital</b></div>
    </div>
    <button onclick="startApp()">Commencer ►</button>
    <p class="small">Les deux personnages apparaîtront ensuite au point de départ.</p>
  </div>
</div>

<div class="panel">
  <h1>🗺️ Naxos depuis Galini</h1>

  <label>Personnage</label>
  <select id="character">
    <option value="gauloise">P’te Gauloise</option>
    <option value="rital">P’t Rital</option>
  </select>

  <label>Mode de déplacement</label>
  <select id="mode">
    <option value="car">🚗 Voiture</option>
    <option value="scooter">🛵 Scooter</option>
  </select>

  <label>Destination</label>
  <select id="destination"></select>

  <button id="goBtn">GO ►</button>
  <button id="planningBtn">Planning 5 jours</button>

  <div class="info" id="infoBox">Choisis un personnage, un mode et une destination.</div>
  <div class="planning" id="planningBox" style="display:none"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const characters={
  gauloise:{name:"P’te Gauloise",img:"assets/pte-gauloise.png"},
  rital:{name:"P’t Rital",img:"assets/pt-rital.png"}
};

const start={name:"Palatiana Agriturismo — Galini",lat:37.1320,lon:25.4240};

const places=[
{name:"Chora / Port de Naxos",lat:37.1036,lon:25.3767,car:"10–15 min",scooter:"12–18 min",category:"ville",moment:"Soirée",note:"Parfait pour dîner, se promener et sortir sans faire trop de route."},
{name:"Agios Prokopios",lat:37.0747,lon:25.3497,car:"18–22 min",scooter:"22–28 min",category:"plage",moment:"Matin ou fin d’après-midi",note:"Très bonne plage, pratique, facile, avec tavernes."},
{name:"Agia Anna",lat:37.0689,lon:25.3541,car:"18–23 min",scooter:"22–28 min",category:"plage",moment:"Fin d’après-midi",note:"Plus animée, sympa pour plage + dîner."},
{name:"Plaka Beach",lat:37.0574,lon:25.3682,car:"22–28 min",scooter:"25–35 min",category:"plage",moment:"Coucher de soleil",note:"Très belle grande plage, excellent choix pour une demi-journée."},
{name:"Mikri Vigla",lat:37.0254,lon:25.3722,car:"28–35 min",scooter:"35–45 min",category:"plage",moment:"Matin",note:"Très belle plage mais attention au vent, surtout en août."},
{name:"Alyko / Hawaii Beach",lat:36.9960,lon:25.3940,car:"35–45 min",scooter:"45–55 min",category:"plage",moment:"Matin",note:"Plus sauvage. Mieux en voiture qu’en scooter."},
{name:"Temple de Déméter",lat:37.0478,lon:25.4325,car:"20–25 min",scooter:"25–30 min",category:"site",moment:"Matin",note:"Très bon arrêt culturel, facile à combiner avec Sangri ou Halki."},
{name:"Halki / Chalki",lat:37.0629,lon:25.4782,car:"25–30 min",scooter:"30–40 min",category:"village",moment:"Matin ou fin d’après-midi",note:"Très joli village intérieur. Route correcte mais plus agréable en voiture."},
{name:"Filoti",lat:37.0527,lon:25.4984,car:"30–35 min",scooter:"35–45 min",category:"village",moment:"Matin",note:"Village de montagne, bon point de départ pour le Mont Zas."},
{name:"Apeiranthos",lat:37.0712,lon:25.5208,car:"40–50 min",scooter:"50–65 min",category:"montagne",moment:"Matinée ou demi-journée",note:"Très beau mais route plus longue et sinueuse. Voiture recommandée."},
{name:"Apollonas",lat:37.1781,lon:25.5539,car:"45–60 min",scooter:"60–75 min",category:"nord",moment:"Journée complète",note:"Beau nord sauvage, mais trajet nettement plus confortable en voiture."},
{name:"Moutsouna",lat:37.0773,lon:25.5847,car:"55–70 min",scooter:"70–90 min",category:"est",moment:"Journée complète",note:"Côte est plus isolée. À faire seulement si vous voulez vraiment explorer."}
];

const plans={
  gauloise:["Chora / Port de Naxos","Agios Prokopios","Temple de Déméter","Halki / Chalki","Apeiranthos"],
  rital:["Plaka Beach","Agia Anna","Mikri Vigla","Alyko / Hawaii Beach","Apollonas"]
};

const map=L.map("map").setView([38.2,23.7],6);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"&copy; OpenStreetMap contributors"}).addTo(map);

function emoji(c){return c==="plage"?"🏖️":c==="ville"?"⚓":c==="site"?"🏛️":c==="village"?"🏘️":c==="montagne"?"⛰️":c==="nord"?"🌊":c==="est"?"🛶":"📌"}
function spotIcon(c){return L.divIcon({className:"",html:`<div class="spotIcon">${emoji(c)}</div>`,iconSize:[30,30],iconAnchor:[15,26]})}
function vehicleIcon(mode,charKey){return L.divIcon({className:"",html:`<div class="vehicleIcon">${mode==="car"?"🚗":"🛵"}<img src="${characters[charKey].img}"></div>`,iconSize:[54,34],iconAnchor:[27,17]})}
const startIcon=L.divIcon({className:"",html:`<div class="startCharacters"><img src="${characters.gauloise.img}"><img src="${characters.rital.img}"></div>`,iconSize:[52,28],iconAnchor:[26,28]});

L.marker([start.lat,start.lon],{icon:startIcon}).addTo(map).bindPopup("<b>Palatiana Agriturismo — Galini</b><br>P’te Gauloise et P’t Rital au départ.");

const routeLayers=[],markerLayers=[];
let vehicleMarker=null,animationTimer=null;

function getColor(p,m){if(m==="car")return"#1f6feb";if(["montagne","nord","est"].includes(p.category))return"#b8b8b8";return"#f28c28"}
function getOpacity(p,m){if(m==="scooter"&&["montagne","nord","est"].includes(p.category))return .18;return .35}
function clearAnim(){if(animationTimer){clearInterval(animationTimer);animationTimer=null}if(vehicleMarker){map.removeLayer(vehicleMarker);vehicleMarker=null}}

function animateVehicle(place,mode,charKey){
  clearAnim();
  let s=0,steps=90;
  vehicleMarker=L.marker([start.lat,start.lon],{icon:vehicleIcon(mode,charKey),interactive:false}).addTo(map);
  animationTimer=setInterval(()=>{
    s++;
    const t=s/steps;
    vehicleMarker.setLatLng([start.lat+(place.lat-start.lat)*t,start.lon+(place.lon-start.lon)*t]);
    if(s>=steps){clearInterval(animationTimer);animationTimer=null}
  },28);
}

function refreshMap(){
  const mode=document.getElementById("mode").value;
  routeLayers.forEach(l=>map.removeLayer(l));
  markerLayers.forEach(l=>map.removeLayer(l));
  routeLayers.length=0;markerLayers.length=0;
  clearAnim();

  places.forEach(p=>{
    const route=L.polyline([[start.lat,start.lon],[p.lat,p.lon]],{color:getColor(p,mode),weight:3,opacity:getOpacity(p,mode),dashArray:"6,10"}).addTo(map);
    const marker=L.marker([p.lat,p.lon],{icon:spotIcon(p.category)}).addTo(map).bindPopup(`<b>${emoji(p.category)} ${p.name}</b><br>${mode==="car"?"🚗 Voiture":"🛵 Scooter"} : <b>${mode==="car"?p.car:p.scooter}</b><br><span class="tag">${p.category}</span><span class="tag">${p.moment}</span><br>${p.note}`);
    routeLayers.push(route);markerLayers.push(marker);
  });
  updateInfo();
}

function updateInfo(){
  const mode=document.getElementById("mode").value;
  const charKey=document.getElementById("character").value;
  const p=places[document.getElementById("destination").value];
  const advice=(mode==="scooter"&&["montagne","nord","est"].includes(p.category))?"<br><b>Conseil :</b> faisable, mais voiture préférable.":mode==="scooter"?"<br><b>Conseil :</b> bon choix en scooter si vous êtes à l’aise.":"<br><b>Conseil :</b> voiture très confortable depuis Galini.";
  document.getElementById("infoBox").innerHTML=`<b><img src="${characters[charKey].img}" style="width:24px;vertical-align:middle"> ${characters[charKey].name}</b><br><b>${emoji(p.category)} ${p.name}</b><br>${mode==="car"?"🚗 Voiture":"🛵 Scooter"} : <b>${mode==="car"?p.car:p.scooter}</b><br>Meilleur moment : <b>${p.moment}</b><br>${p.note}${advice}`;
}

function showPlanning(){
  const charKey=document.getElementById("character").value;
  const list=plans[charKey];
  let html=`<b>🗓️ Parcours idéal 5 jours — ${characters[charKey].name}</b><br>`;
  list.forEach((name,i)=>{
    const p=places.find(x=>x.name===name);
    html+=`<br><b>Jour ${i+1}</b> — ${emoji(p.category)} ${p.name}<br><span class="tag">${p.moment}</span> ${p.note}`;
  });
  const box=document.getElementById("planningBox");
  box.style.display="block";
  box.innerHTML=html;
}

const destinationSelect=document.getElementById("destination");
places.forEach((p,i)=>{
  const o=document.createElement("option");
  o.value=i;
  o.textContent=`${emoji(p.category)} ${p.name}`;
  destinationSelect.appendChild(o);
});

document.getElementById("mode").addEventListener("change",refreshMap);
document.getElementById("destination").addEventListener("change",updateInfo);
document.getElementById("character").addEventListener("change",()=>{updateInfo();showPlanning()});
document.getElementById("planningBtn").addEventListener("click",showPlanning);

document.getElementById("goBtn").addEventListener("click",()=>{
  const mode=document.getElementById("mode").value;
  const charKey=document.getElementById("character").value;
  const index=document.getElementById("destination").value;
  const p=places[index];
  map.flyTo([p.lat,p.lon],14,{animate:true,duration:2.4});
  animateVehicle(p,mode,charKey);
  setTimeout(()=>markerLayers[index].openPopup(),2400);
});

function startApp(){
  document.getElementById("welcome").style.display="none";
  map.flyTo([37.10,25.44],11,{animate:true,duration:4});
}

refreshMap();
setTimeout(()=>map.flyTo([37.10,25.44],11,{animate:true,duration:4}),900);
</script>

</body>
</html>
